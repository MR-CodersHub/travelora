<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TRAVELORA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon-v2.svg">
    <style>
        .step-2 {
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .success-banner {
            display: none;
            background: #ecfdf5;
            color: #065f46;
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid #a7f3d0;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1);
        }

        .auth-card {
            overflow: visible !important;
            /* Allow focus shadows to show */
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <header>
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo-icon-v2.svg" alt="TRAVELORA Icon">
                <span>TRAVELORA</span>
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../home2.html">Home 2</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
                <div class="nav-indicator"></div>
            </ul>
            <button class="mobile-toggle">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="nav-auth">
                <a href="login.html" class="user-icon-btn"><i class="fa-solid fa-circle-user"></i></a>
            </div>
        </div>
    </header>

    <!-- Reset Password Section -->
    <main class="auth-section">
        <div class="auth-card">
            <!-- Brand Header -->
            <a href="../index.html" class="auth-brand-header">
                <img src="../assets/images/logo-icon-v2.svg" alt="TRAVELORA Icon">
                <span>TRAVELORA</span>
            </a>

            <div class="auth-header">
                <h1 id="resetTitle">Reset Password</h1>
                <p id="resetSub">Enter your email address to receive a reset link.</p>
            </div>

            <div class="success-banner" id="globalSuccess">
                <i class="fa-solid fa-circle-check"></i> <span id="successText">Reset link has been sent to your
                    email!</span>
            </div>

            <form class="auth-form" id="resetForm">
                <!-- Step 1: Email -->
                <div class="step-1">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-group">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" class="auth-input" placeholder="Enter your email" required>
                        </div>
                        <span class="error-msg" id="email-error"><i class="fa-solid fa-circle-exclamation"></i> Please
                            enter a valid email.</span>
                    </div>
                    <button type="button" class="auth-btn" id="sendLinkBtn">Send Reset Link</button>
                </div>

                <!-- Step 2: New Password (Revealed) -->
                <div class="step-2">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="newPassword" class="auth-input"
                                placeholder="Minimum 8 characters">
                            <i class="fa-solid fa-eye-slash password-toggle"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirmPassword" class="auth-input"
                                placeholder="Repeat your new password">
                        </div>
                        <span class="error-msg" id="match-error"><i class="fa-solid fa-circle-exclamation"></i>
                            Passwords do not match.</span>
                    </div>

                    <button type="submit" class="auth-btn" id="updateBtn">Update Password</button>
                </div>

                <div class="auth-footer">
                    Back to <a href="login.html">Log In</a>
                </div>
            </form>
        </div>
    </main>

    <script src="../assets/js/footer.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resetForm = document.getElementById('resetForm');
            const sendLinkBtn = document.getElementById('sendLinkBtn');
            const step1 = document.querySelector('.step-1');
            const step2 = document.querySelector('.step-2');
            const globalSuccess = document.getElementById('globalSuccess');
            const successText = document.getElementById('successText');
            const resetTitle = document.getElementById('resetTitle');
            const resetSub = document.getElementById('resetSub');

            // Step 1 Flow
            sendLinkBtn.addEventListener('click', () => {
                const emailInput = document.getElementById('email');
                const emailError = document.getElementById('email-error');

                if (!emailInput.value || !emailInput.value.includes('@')) {
                    emailInput.classList.add('error');
                    emailError.classList.add('visible');
                    return;
                }

                emailInput.classList.remove('error');
                emailError.classList.remove('visible');

                sendLinkBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
                sendLinkBtn.disabled = true;

                setTimeout(() => {
                    // Transition to step 2 as per user request
                    step1.style.display = 'none';
                    step2.style.display = 'block';
                    globalSuccess.style.display = 'block';

                    resetTitle.textContent = 'Create New Password';
                    resetSub.textContent = 'Please enter your new security credentials below.';

                    // Keep success message visible briefly or until update
                }, 1500);
            });

            // Step 2 Flow (Update Password)
            resetForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const newPass = document.getElementById('newPassword');
                const confirmPass = document.getElementById('confirmPassword');
                const matchError = document.getElementById('match-error');
                const updateBtn = document.getElementById('updateBtn');

                // Basic validation
                if (newPass.value.length < 1) {
                    newPass.classList.add('error');
                    return;
                }

                if (newPass.value !== confirmPass.value) {
                    confirmPass.classList.add('error');
                    matchError.classList.add('visible');
                    return;
                }

                matchError.classList.remove('visible');
                confirmPass.classList.remove('error');
                newPass.classList.remove('error');

                updateBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';
                updateBtn.disabled = true;

                setTimeout(() => {
                    successText.textContent = 'Password updated successfully! Redirecting...';
                    globalSuccess.style.background = '#dcfce7';
                    globalSuccess.style.color = '#166534';

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }, 1500);
            });
        });
    </script>
</body>

</html>
