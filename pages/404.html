<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | TRAVELORA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon-v2.svg">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--bg-light);
            padding: 2rem;
        }

        .error-content h1 {
            font-size: 10rem;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 2rem;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div class="error-page">
        <div class="error-content">
            <a href="../index.html" class="logo" style="justify-content: center; margin-bottom: 2rem; display: flex;">
                <img src="../assets/images/logo-icon-v2.svg" alt="TRAVELORA Icon">
                <span
                    style="font-weight: 900; font-size: 1.5rem; letter-spacing: 0.05em; color: var(--secondary);">TRAVELORA</span>
            </a>
            <h1>404</h1>
            <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Lost in Transit?</h2>
            <p style="font-size: 1.25rem; color: var(--text-muted); margin-bottom: 3rem;">Oops! It looks like you've
                wandered off the map. This page doesn't exist.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="../index.html" class="btn btn-primary">Back to Home</a>
                <a href="contact.html" class="btn btn-outline">Report an Issue</a>
            </div>
        </div>
    </div>
<script src="../assets/js/footer.js"></script>
<script src="../assets/js/main.js"></script>
</body>

</html>
